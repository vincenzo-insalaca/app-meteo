name: meteo
description: "App meteo con Flutter, BLoC, Dio e GoRouter."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.0
  bloc: ^9.0.0
  equatable: ^2.0.5
  bloc_concurrency: ^0.3.0

  # Navigation
  go_router: ^14.8.1

  # Network
  dio: ^5.8.0
  dio_smart_retry: ^6.0.0
  pretty_dio_logger: ^1.4.0
  retrofit: ^4.4.1
  json_annotation: ^4.9.0

  # Dependency Injection
  get_it: ^8.0.3

  # Connectivity
  internet_connection_checker_plus: ^2.7.1

  # Location
  geolocator: ^14.0.2

  # UI & Utils
  weather_icons: ^3.0.0
  intl: ^0.20.2
  logger: ^2.5.0

  # Persistence
  shared_preferences: ^2.3.2

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Localization
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  retrofit_generator: ^10.0.0
  json_serializable: ^6.9.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  generate: true

flutter_launcher_icons:
  # Percorso immagine sorgente (1024x1024px PNG)
  image_path: "assets/icon/icon.png"

  android: true
  ios: true

  # Android — icona adattiva (Android 8+)
  adaptive_icon_background: "#1C3A6E"   # stesso blu dello sfondo app
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"

  # Web (opzionale)
  web:
    generate: false
