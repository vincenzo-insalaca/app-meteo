name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'   # Trigger su tag tipo v1.0.0

jobs:
  build:
    name: Build Android App Bundle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (build_runner + l10n)
        run: |
          flutter gen-l10n
          dart run build_runner build --delete-conflicting-outputs

      - name: Run tests
        run: flutter test

      - name: Decode keystore
        # Il keystore è salvato come secret in base64:
        # cat meteo-release.jks | base64 | pbcopy  → incolla in KEYSTORE_BASE64
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/keystore.jks

      - name: Build App Bundle
        env:
          KEY_STORE_PATH: keystore.jks
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          flutter build appbundle \
            --release \
            --dart-define=OWM_API_KEY=${{ secrets.OWM_API_KEY }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: meteo-release.aab
          path: build/app/outputs/bundle/release/app-release.aab

      - name: Upload to Google Play (Internal track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.example.meteo
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
